# --- BASIC SETTINGS ---
set -g mouse on                        # Enable mouse support
set -g history-limit 10000            # Scrollback buffer
set-option -g default-shell $SHELL    # Use your default shell

# --- PREFIX REMAP (Optional) ---
# Use Ctrl+a instead of Ctrl+b (like GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- SPLIT PANE SHORTCUTS ---
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# --- PANE NAVIGATION (Vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- STATUS BAR (dotbar theme - github.com/vaaleyard/tmux-dotbar) ---
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "fg=#475266,bg=#0B0E14"
set -g status-justify absolute-centre
set -g status-left-length 40
set -g status-right-length 40

# Left: session name (highlights green on prefix)
set -g status-left "#[bg=#0B0E14,fg=#565B66]#{?client_prefix,,  #S }#[bg=#95E6CB,fg=#0B0E14,bold]#{?client_prefix,  #S ,}"
# Right: empty by default
set -g status-right ""

# Window tabs
setw -g window-status-style "fg=#475266,bg=#0B0E14"
setw -g window-status-format " #W "
setw -g window-status-separator " · "
setw -g window-status-current-format "#[fg=#BFBDB6,bg=#0B0E14] #W "
setw -g window-status-bell-style "bg=#95E6CB,fg=#0B0E14,bold"
setw -g window-status-activity-style "bg=#BFBDB6,fg=#0B0E14"


# --- PANE BORDERS ---
set -g pane-border-style "fg=#565B66"
set -g pane-active-border-style "fg=#95E6CB"

# --- VI MODE COPY/PASTE ---
setw -g mode-keys vi

# --- TPM PLUGIN MANAGER ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# Initialize TPM
run -b '~/.tmux/plugins/tpm/tpm'
