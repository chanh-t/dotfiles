# --- BASIC SETTINGS ---
set -g mouse on                        # Enable mouse support
set -g history-limit 10000            # Scrollback buffer
set-option -g default-shell $SHELL    # Use your default shell

# --- PREFIX REMAP (Optional) ---
# Use Ctrl+a instead of Ctrl+b (like GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- SPLIT PANE SHORTCUTS ---
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# --- PANE NAVIGATION (Vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- STATUS BAR ---
# Remove manual colors so Nord can set them
#set -g status-bg colour235
#set -g status-fg green

set -g status on
set -g status-interval 5
set -g status-right "%Y-%m-%d %H:%M"
set -g status-left "#[bold]#S"  # session name


# --- VI MODE COPY/PASTE ---
setw -g mode-keys vi

# --- TPM PLUGIN MANAGER ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'arcticicestudio/nord-tmux'
# Initialize TPM
run -b '~/.tmux/plugins/tpm/tpm'
